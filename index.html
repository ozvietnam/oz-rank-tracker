<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZ Rank Tracker - Theo Dõi Từ Khóa</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header/Navbar */
        .navbar {
            background: linear-gradient(90deg, #1a3a8c 0%, #c0392b 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .navbar h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .navbar p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .metric-card h3 {
            color: #7f8c8d;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(90deg, #1a3a8c 0%, #c0392b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Form Section */
        .form-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .form-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a3a8c;
            box-shadow: 0 0 0 3px rgba(26, 58, 140, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #1a3a8c 0%, #c0392b 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 58, 140, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-update {
            background: #27ae60;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-update:hover {
            background: #229954;
        }

        /* Keywords Table */
        .table-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        .table-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table td {
            padding: 15px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        table tbody tr:hover {
            background: #f8f9fa;
        }

        .keyword-name {
            font-weight: 600;
            color: #2c3e50;
        }

        /* Status Badges */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            min-width: 70px;
        }

        .badge-top10 {
            background: #d5f4e6;
            color: #27ae60;
        }

        .badge-top20 {
            background: #fef5e7;
            color: #f39c12;
        }

        .badge-below {
            background: #fadbd8;
            color: #e74c3c;
        }

        .badge-unranked {
            background: #ecf0f1;
            color: #95a5a6;
        }

        .trend {
            font-size: 18px;
            text-align: center;
        }

        /* Rank Input */
        .rank-input {
            width: 70px;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        .rank-input:focus {
            outline: none;
            border-color: #1a3a8c;
            box-shadow: 0 0 0 3px rgba(26, 58, 140, 0.1);
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .metrics-grid {
                grid-template-columns: 1fr 1fr;
            }

            table {
                font-size: 12px;
            }

            table th, table td {
                padding: 8px;
            }

            .navbar h1 {
                font-size: 20px;
            }

            .metric-value {
                font-size: 28px;
            }
        }

        /* Success Message */
        .success-msg {
            background: #d5f4e6;
            color: #27ae60;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function RankTracker() {
            const [keywords, setKeywords] = useState([]);
            const [newKeyword, setNewKeyword] = useState('');
            const [newRank, setNewRank] = useState('');
            const [newTarget, setNewTarget] = useState('');
            const [successMsg, setSuccessMsg] = useState('');

            // Load data from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('oz_keywords');
                if (saved) {
                    setKeywords(JSON.parse(saved));
                }
            }, []);

            // Save to localStorage whenever keywords change
            useEffect(() => {
                localStorage.setItem('oz_keywords', JSON.stringify(keywords));
            }, [keywords]);

            const addKeyword = (e) => {
                e.preventDefault();
                if (newKeyword.trim() && newRank && newTarget) {
                    const keyword = {
                        id: Date.now(),
                        name: newKeyword,
                        currentRank: parseInt(newRank),
                        targetRank: parseInt(newTarget),
                        createdAt: new Date().toLocaleDateString('vi-VN'),
                        updatedAt: new Date().toLocaleDateString('vi-VN')
                    };
                    setKeywords([...keywords, keyword]);
                    setNewKeyword('');
                    setNewRank('');
                    setNewTarget('');
                    setSuccessMsg(`✓ Thêm từ khóa "${newKeyword}" thành công`);
                    setTimeout(() => setSuccessMsg(''), 3000);
                }
            };

            const updateRank = (id, newCurrentRank) => {
                const updated = keywords.map(kw => 
                    kw.id === id 
                        ? { ...kw, currentRank: parseInt(newCurrentRank) || 0, updatedAt: new Date().toLocaleDateString('vi-VN') }
                        : kw
                );
                setKeywords(updated);
            };

            const deleteKeyword = (id) => {
                setKeywords(keywords.filter(kw => kw.id !== id));
            };

            const getRankBadgeClass = (rank) => {
                if (rank === 0) return 'badge-unranked';
                if (rank <= 10) return 'badge-top10';
                if (rank <= 20) return 'badge-top20';
                return 'badge-below';
            };

            const getRankStatus = (rank) => {
                if (rank === 0) return 'Không xếp hạng';
                if (rank <= 10) return `Top 10 (#${rank})`;
                if (rank <= 20) return `Top 20 (#${rank})`;
                return `#${rank}`;
            };

            const getTrendIcon = (current, target) => {
                if (current === 0) return '—';
                if (current < target) return '📈';
                if (current > target) return '📉';
                return '➡️';
            };

            const getMetrics = () => {
                return {
                    total: keywords.length,
                    top10: keywords.filter(kw => kw.currentRank > 0 && kw.currentRank <= 10).length,
                    top20: keywords.filter(kw => kw.currentRank > 0 && kw.currentRank <= 20).length,
                    tracked: keywords.filter(kw => kw.currentRank > 0).length
                };
            };

            const metrics = getMetrics();

            return (
                <div className="container">
                    {/* Navbar */}
                    <div className="navbar">
                        <h1>🎯 OZ Rank Tracker</h1>
                        <p>Theo dõi xếp hạng từ khóa thời gian thực — Manage Keywords Like a Pro</p>
                    </div>

                    {/* Metrics */}
                    <div className="metrics-grid">
                        <div className="metric-card">
                            <h3>Tổng Từ Khóa</h3>
                            <div className="metric-value">{metrics.total}</div>
                        </div>
                        <div className="metric-card">
                            <h3>Top 10</h3>
                            <div className="metric-value">{metrics.top10}</div>
                        </div>
                        <div className="metric-card">
                            <h3>Top 20</h3>
                            <div className="metric-value">{metrics.top20}</div>
                        </div>
                        <div className="metric-card">
                            <h3>Đang Theo Dõi</h3>
                            <div className="metric-value">{metrics.tracked}</div>
                        </div>
                    </div>

                    {/* Add Keyword Form */}
                    <div className="form-section">
                        <h2>Thêm Từ Khóa Mới</h2>
                        {successMsg && <div className="success-msg">{successMsg}</div>}
                        <form onSubmit={addKeyword}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label>Từ Khóa</label>
                                    <input
                                        type="text"
                                        placeholder="Nhập từ khóa (vd: máy điều hòa nhập khẩu)"
                                        value={newKeyword}
                                        onChange={(e) => setNewKeyword(e.target.value)}
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Rank Hiện Tại</label>
                                    <input
                                        type="number"
                                        placeholder="Vd: 15"
                                        value={newRank}
                                        onChange={(e) => setNewRank(e.target.value)}
                                        min="0"
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Target Rank</label>
                                    <input
                                        type="number"
                                        placeholder="Vd: 5"
                                        value={newTarget}
                                        onChange={(e) => setNewTarget(e.target.value)}
                                        min="1"
                                        required
                                    />
                                </div>
                                <button type="submit" className="btn btn-primary">Thêm</button>
                            </div>
                        </form>
                    </div>

                    {/* Keywords Table */}
                    <div className="table-section">
                        <h2>Danh Sách Từ Khóa ({keywords.length})</h2>
                        {keywords.length === 0 ? (
                            <div className="empty-state">
                                <p>📊 Chưa có từ khóa nào. Hãy thêm từ khóa đầu tiên!</p>
                            </div>
                        ) : (
                            <table>
                                <thead>
                                    <tr>
                                        <th>Từ Khóa</th>
                                        <th>Rank Hiện Tại</th>
                                        <th>Target</th>
                                        <th>Trend</th>
                                        <th>Cập Nhật</th>
                                        <th>Ngày</th>
                                        <th>Hành Động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {keywords.map((kw) => (
                                        <tr key={kw.id}>
                                            <td className="keyword-name">{kw.name}</td>
                                            <td>
                                                <span className={`badge ${getRankBadgeClass(kw.currentRank)}`}>
                                                    {getRankStatus(kw.currentRank)}
                                                </span>
                                            </td>
                                            <td>#{kw.targetRank}</td>
                                            <td className="trend">{getTrendIcon(kw.currentRank, kw.targetRank)}</td>
                                            <td>
                                                <div className="actions">
                                                    <input
                                                        type="number"
                                                        className="rank-input"
                                                        value={kw.currentRank}
                                                        onChange={(e) => updateRank(kw.id, e.target.value)}
                                                        min="0"
                                                    />
                                                </div>
                                            </td>
                                            <td>{kw.updatedAt}</td>
                                            <td>
                                                <button 
                                                    className="btn btn-danger"
                                                    onClick={() => deleteKeyword(kw.id)}
                                                >
                                                    Xóa
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Footer */}
                    <div className="footer">
                        <p>💾 Dữ liệu được lưu tự động trong trình duyệt của bạn. Không cần đăng nhập.</p>
                        <p>🚀 OZ Rank Tracker v1.0 — Built for CEOs</p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<RankTracker />, document.getElementById('root'));
    </script>
</body>
</html>
